<!doctype html>
<html lang="vi" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassMonEz Cloud</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Chìa khóa của Jayd Phúc
    const firebaseConfig = {
      apiKey: "AIzaSyDzwFZotQFJdxy32lWbvyN79Ev7L1wp8aA",
      authDomain: "pass-mon-ez.firebaseapp.com",
      projectId: "pass-mon-ez",
      storageBucket: "pass-mon-ez.firebasestorage.app",
      messagingSenderId: "150479855404",
      appId: "1:150479855404:web:068bea5aecfd0670971689",
      measurementId: "G-FJ5BJ8XK2T"
    };

    const app = initializeApp(firebaseConfig);
    window.cloudDB = getFirestore(app);
    window.fbUtils = { collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Be Vietnam Pro', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card-press { transition: transform 0.15s ease; }
    .card-press:active { transform: scale(0.97); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
  </style>
 </head>
 <body class="h-full bg-stone-100 text-stone-800">
  <div id="app" class="h-full w-full overflow-auto">
   
   <div id="screen-home" class="fade-in max-w-md mx-auto px-5 py-8">
    <div class="mb-8">
     <h1 class="text-3xl font-bold text-stone-900 tracking-tight">PassMonEz</h1>
     <p class="text-sm text-stone-500 mt-2">Dữ liệu chung cho Phúc và bạn bè 🚀</p>
    </div>
    <div id="categories-container" class="space-y-3"></div>
   </div>

   <div id="screen-list" class="fade-in max-w-md mx-auto px-5 py-6 hidden">
    <div class="flex items-center gap-3 mb-6">
     <button onclick="goHome()" class="w-9 h-9 rounded-xl bg-white border border-stone-200 flex items-center justify-center"> <i data-lucide="arrow-left" class="w-4 h-4"></i> </button>
     <h1 id="list-title" class="text-lg font-bold flex-1"></h1>
     <button onclick="openAddForm()" id="btn-add" class="w-9 h-9 rounded-xl flex items-center justify-center"> <i data-lucide="plus" class="w-5 h-5 text-white"></i> </button>
    </div>
    <div id="items-list" class="space-y-3 pb-8"></div>
   </div>

   <div id="screen-form" class="fade-in max-w-md mx-auto px-5 py-6 hidden">
    <div class="flex items-center gap-3 mb-6">
     <button onclick="closeForm()" class="w-9 h-9 rounded-xl bg-white border border-stone-200 flex items-center justify-center"> <i data-lucide="arrow-left" class="w-4 h-4"></i> </button>
     <h1 class="text-lg font-bold">Thêm tài liệu</h1>
    </div>
    <form class="space-y-4">
     <input id="input-subject" type="text" placeholder="Tên môn học" class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm">
     <input id="input-title" type="text" placeholder="Tiêu đề" class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm">
     <input id="link-single" type="url" placeholder="Dán link tài liệu tại đây" class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm">
     <button type="button" onclick="saveItem()" id="btn-save" class="w-full py-3.5 rounded-xl text-white font-semibold bg-stone-800">Chia sẻ với bạn bè</button>
    </form>
   </div>

  </div>

  <script>
    let allData = [];
    let currentCategory = '';

    // Lắng nghe dữ liệu chung từ Cloud
    window.addEventListener('firebase-ready', () => {
      const { onSnapshot, collection, query, orderBy } = window.fbUtils;
      const q = query(collection(window.cloudDB, "shared_items"), orderBy("created_at", "desc"));
      onSnapshot(q, (snapshot) => {
        allData = snapshot.docs.map(doc => ({ ...doc.data(), __backendId: doc.id }));
        if (currentCategory) renderList();
        else renderHome();
      });
    });

    const categoryConfig = {
      'on-thi': { label: 'Ôn Thi', color: 'amber', icon: '📚' },
      'bai-hoc': { label: 'Bài Học', color: 'sky', icon: '🎓' },
      'trac-nghiem': { label: 'Trắc Nghiệm', color: 'violet', icon: '❓' }
    };

    function renderHome() {
      const container = document.getElementById('categories-container');
      container.innerHTML = '';
      Object.keys(categoryConfig).forEach(key => {
        const cfg = categoryConfig[key];
        const count = allData.filter(d => d.category === key).length;
        const btn = document.createElement('button');
        btn.className = 'w-full bg-white rounded-2xl p-6 flex items-center gap-4 border-2 border-stone-200 text-left';
        btn.innerHTML = `<div class="text-4xl">${cfg.icon}</div>
          <div class="flex-1"><h2 class="font-bold">${cfg.label}</h2><p class="text-xs text-stone-400">${count} tài liệu chung</p></div>`;
        btn.onclick = () => openCategory(key);
        container.appendChild(btn);
      });
      showScreen('screen-home');
      lucide.createIcons();
    }

    function openCategory(cat) {
      currentCategory = cat;
      document.getElementById('list-title').textContent = categoryConfig[cat].label;
      document.getElementById('btn-add').style.backgroundColor = '#262626';
      renderList();
      showScreen('screen-list');
    }

    function renderList() {
      const items = allData.filter(d => d.category === currentCategory);
      const container = document.getElementById('items-list');
      container.innerHTML = items.length ? '' : '<p class="text-center text-stone-400 py-10">Chưa có ai share tài liệu nào ở đây.</p>';
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white p-4 rounded-xl border border-stone-200 relative';
        card.innerHTML = `<p class="text-[10px] font-bold text-stone-400 uppercase">${item.subject}</p>
          <h3 class="font-bold">${item.title}</h3>
          <a href="${item.links}" target="_blank" class="text-xs text-sky-600 mt-2 block">🔗 Nhấn để xem tài liệu</a>
          <button onclick="deleteItem('${item.__backendId}')" class="absolute top-4 right-4 text-red-300">Xóa</button>`;
        container.appendChild(card);
      });
    }

    async function saveItem() {
      const subject = document.getElementById('input-subject').value;
      const title = document.getElementById('input-title').value;
      const link = document.getElementById('link-single').value;
      if(!subject || !title || !link) return alert("Phúc ơi, nhập đủ thông tin nhé!");
      
      await window.fbUtils.addDoc(window.fbUtils.collection(window.cloudDB, "shared_items"), {
        category: currentCategory, subject, title, links: link, created_at: new Date().toISOString()
      });
      closeForm();
    }

    async function deleteItem(id) {
      if(confirm("Xóa tài liệu này khỏi đám mây của cả nhóm?")) {
        await window.fbUtils.deleteDoc(window.fbUtils.doc(window.cloudDB, "shared_items", id));
      }
    }

    function showScreen(id) {
      document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }
    function goHome() { currentCategory = ''; renderHome(); }
    function openAddForm() { showScreen('screen-form'); }
    function closeForm() { openCategory(currentCategory); }
    
    renderHome();
  </script>
 </body>
</html>

<!doctype html>
<html lang="vi" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassMonEz Cloud</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // JAYD DÁN ĐOẠN CẤU HÌNH CỦA CẬU VÀO ĐÂY
    const firebaseConfig = {
      apiKey: "AIzaSyDzwFZotQFJdxy32lWbvyN79Ev7L1wp8aA",
      authDomain: "pass-mon-ez.firebaseapp.com",
      projectId: "pass-mon-ez",
      storageBucket: "pass-mon-ez.firebasestorage.app",
      messagingSenderId: "150479855404",
      appId: "1:150479855404:web:068bea5aecfd0670971689",
      measurementId: "G-FJ5BJ8XK2T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Đưa ra cửa sổ toàn cục để logic bên dưới dùng được
    window.cloudDB = db;
    window.fbUtils = { collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Be Vietnam Pro', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card-press { transition: transform 0.15s ease; }
    .card-press:active { transform: scale(0.97); }
    input, textarea { font-size: 16px !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
  </style>
 </head>
 <body class="h-full bg-stone-100 text-stone-800">
  <div id="app" class="h-full w-full overflow-auto">
   <div id="screen-home" class="fade-in max-w-md mx-auto px-5 py-8">
    <div class="mb-8">
     <h1 id="app-title" class="text-3xl font-bold text-stone-900 tracking-tight">PassMonEz</h1>
     <p class="text-sm text-stone-500 mt-2">Dữ liệu Đám Mây - Lưu một nơi, xem mọi thiết bị</p>
    </div>
    <div id="categories-container" class="space-y-3"></div>
   </div>

   <div id="screen-list" class="fade-in max-w-md mx-auto px-5 py-6 hidden">
    <div class="flex items-center gap-3 mb-6">
     <button onclick="goHome()" class="w-9 h-9 rounded-xl bg-white border border-stone-200 flex items-center justify-center card-press"> <i data-lucide="arrow-left" class="w-4 h-4 text-stone-500"></i> </button>
     <h1 id="list-title" class="text-lg font-bold text-stone-800 flex-1"></h1>
     <button onclick="openAddForm()" id="btn-add" class="w-9 h-9 rounded-xl flex items-center justify-center card-press"> <i data-lucide="plus" class="w-5 h-5 text-white"></i> </button>
    </div>
    <div id="items-list" class="space-y-3 pb-8"></div>
    <div id="empty-state" class="text-center py-16 hidden">
     <p class="text-4xl mb-3">📂</p>
     <p class="text-stone-400 text-sm">Chưa có mục nào</p>
    </div>
   </div>

   <div id="screen-quiz-list" class="fade-in max-w-md mx-auto px-5 py-6 hidden">
    <div class="flex items-center gap-3 mb-6">
     <button onclick="goHome()" class="w-9 h-9 rounded-xl bg-white border border-stone-200 flex items-center justify-center card-press"> <i data-lucide="arrow-left" class="w-4 h-4 text-stone-500"></i> </button>
     <h1 id="quiz-list-title" class="text-lg font-bold text-stone-800 flex-1"></h1>
     <button onclick="openAddQuiz()" id="btn-add-quiz" class="w-9 h-9 rounded-xl flex items-center justify-center card-press"> <i data-lucide="plus" class="w-5 h-5 text-white"></i> </button>
    </div>
    <div id="quiz-items-list" class="space-y-3 pb-8"></div>
    <div id="quiz-empty-state" class="text-center py-16 hidden">
     <p class="text-4xl mb-3">📋</p>
     <p class="text-stone-400 text-sm">Chưa có bài trắc nghiệm</p>
    </div>
   </div>

   <div id="delete-overlay" class="hidden fixed inset-0 bg-black/30 flex items-end justify-center z-50">
    <div class="bg-white rounded-t-2xl w-full max-w-md p-6 fade-in">
     <p class="text-sm font-semibold text-stone-800 mb-5">Xoá mục này vĩnh viễn trên Cloud?</p>
     <div class="flex gap-3">
      <button onclick="cancelDelete()" class="flex-1 py-3 bg-stone-100 rounded-xl text-sm font-medium text-stone-600">Huỷ</button>
      <button onclick="confirmDelete()" id="btn-confirm-delete" class="flex-1 py-3 bg-red-500 rounded-xl text-sm font-medium text-white">Xoá</button>
     </div>
    </div>
   </div>
  </div>

  <script>
    // --- LOGIC KẾT NỐI FIREBASE CỦA PHÚC ---
    let allData = [];
    let currentCategory = '';
    let fileChunks = new Map();

    const dataHandler = {
      onDataChanged(data) {
        allData = data;
        // Xử lý File Chunks
        const fileRecords = data.filter(d => d.file_data && d.item_id);
        fileChunks.clear();
        fileRecords.forEach(rec => {
          if (!fileChunks.has(rec.item_id)) fileChunks.set(rec.item_id, []);
          fileChunks.get(rec.item_id).push({ type: rec.file_type, data: rec.file_data, index: rec.file_index || 0, name: rec.file_name });
        });
        fileChunks.forEach(files => files.sort((a, b) => a.index - b.index));

        if (currentCategory) {
            if (categoryConfig[currentCategory].hasQuiz) openQuizList(currentCategory);
            else renderList();
        } else renderHome();
      }
    };

    window.addEventListener('firebase-ready', () => {
        const { onSnapshot, collection, query, orderBy } = window.fbUtils;
        const q = query(collection(window.cloudDB, "items"), orderBy("created_at", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ ...doc.data(), __backendId: doc.id }));
            dataHandler.onDataChanged(data);
        });
    });

    window.dataSdk = {
        create: async (record) => {
            await window.fbUtils.addDoc(window.fbUtils.collection(window.cloudDB, "items"), record);
            return { isOk: true };
        },
        delete: async (record) => {
            await window.fbUtils.deleteDoc(window.fbUtils.doc(window.cloudDB, "items", record.__backendId));
            return { isOk: true };
        }
    };

    // --- CẤU HÌNH GIAO DIỆN ---
    const categoryConfig = {
      'on-thi': { label: 'Ôn Thi', color: 'amber', icon: '📚', hasQuiz: false },
      'bai-hoc': { label: 'Bài Học', color: 'sky', icon: '🎓', hasQuiz: false },
      'bai-tap': { label: 'Bài Tập', color: 'emerald', icon: '📝', hasQuiz: false },
      'trac-nghiem': { label: 'Trắc Nghiệm', color: 'violet', icon: '❓', hasQuiz: true }
    };
    const colorMap = {
      amber: { bg: 'bg-amber-500', text: 'text-amber-600', grad: 'from-amber-100 to-amber-50' },
      sky: { bg: 'bg-sky-500', text: 'text-sky-600', grad: 'from-sky-100 to-sky-50' },
      emerald: { bg: 'bg-emerald-500', text: 'text-emerald-600', grad: 'from-emerald-100 to-emerald-50' },
      violet: { bg: 'bg-violet-500', text: 'text-violet-600', grad: 'from-violet-100 to-violet-50' }
    };

    function renderHome() {
      const container = document.getElementById('categories-container');
      container.innerHTML = '';
      Object.keys(categoryConfig).forEach(key => {
        const cfg = categoryConfig[key];
        const colors = colorMap[cfg.color];
        const count = allData.filter(d => d.category === key && !d.file_data).length;
        const btn = document.createElement('button');
        btn.className = 'card-press w-full bg-white rounded-2xl p-6 flex items-center gap-4 border-2 border-stone-200 text-left';
        btn.innerHTML = `<div class="w-16 h-16 rounded-xl bg-gradient-to-br ${colors.grad} flex items-center justify-center text-4xl">${cfg.icon}</div>
          <div class="flex-1">
            <h2 class="font-bold text-stone-900 text-lg">${cfg.label}</h2>
            <div class="flex items-center gap-2 mt-1">
              <div class="w-6 h-6 rounded-lg ${colors.bg} flex items-center justify-center text-white text-[10px] font-bold">${count}</div>
              <span class="text-xs text-stone-500">mục</span>
            </div>
          </div><i data-lucide="chevron-right" class="text-stone-300"></i>`;
        btn.onclick = () => cfg.hasQuiz ? openQuizList(key) : openCategory(key);
        container.appendChild(btn);
      });
      showScreen('screen-home');
      lucide.createIcons();
    }

    // (CÁC HÀM renderList, goHome, showScreen,... GIỮ NGUYÊN NHƯ CODE GỐC CỦA CẬU)
    // LƯU Ý: Ở hàm saveItem và saveQuiz, hãy gọi window.dataSdk.create(record) thay vì cái cũ.

    function goHome() { currentCategory = ''; renderHome(); }
    function showScreen(id) {
        document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    // ... Copy tiếp các hàm xử lý Quiz và File của bạn vào đây ...
  </script>
 </body>
</html>
